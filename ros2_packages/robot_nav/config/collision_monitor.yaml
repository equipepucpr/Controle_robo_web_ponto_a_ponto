# Nav2 Collision Monitor configuration
# Reads /scan from LiDAR and filters /cmd_vel to prevent collisions.
#
# Two safety zones:
#   PolygonSlow: 0.6m circle  -> slows robot to 50%
#   PolygonStop: 0.25m circle -> stops robot completely
#
# Tune polygon sizes to match your robot's real dimensions.

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel"
    cmd_vel_out_topic: "cmd_vel_filtered"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0

    # Safety polygons (circles around robot center)
    polygons: ["PolygonStop", "PolygonSlow"]

    # STOP zone: robot halts completely when obstacle is within 25cm
    PolygonStop:
      type: "circle"
      radius: 0.25
      action_type: "stop"
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true

    # SLOW zone: robot slows to 50% when obstacle is within 60cm
    PolygonSlow:
      type: "circle"
      radius: 0.60
      action_type: "slowdown"
      slowdown_ratio: 0.5
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_slow"
      enabled: true

    observation_sources: ["scan"]

    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.05
      max_height: 0.5
      enabled: true

lifecycle_manager:
  ros__parameters:
    autostart: true
    node_names: ["collision_monitor"]
